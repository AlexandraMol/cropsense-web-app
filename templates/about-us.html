{% extends "base.html" %}
{% block title %}About Us{% endblock %}

{% block content %}
<div class="container py-5">

    <!-- Title -->
    <div class="text-center mb-5">
        <h1>Meet Our Team</h1>
        <p class="text-medium-green">We are a passionate group of creators</p>
    </div>

    <!-- Team Grid -->
    <div class="row g-4 justify-content-center">

        <!-- MEMBER CARD -->
        {% for member in members %}
        <div class="col-md-4 col-lg-3">
            <div class="card section-card h-100 text-center p-3">

                <img src="{{ member.image }}"
                     class="rounded-circle mx-auto mb-3 profile-img">

                <h5>{{ member.name }}</h5>

                <p class="text-medium-green mb-2">{{ member.role }}</p>

                <a href="{{ member.linkedin }}" target="_blank" class="btn btn-accent btn-sm mt-2">
                    <i class="bi bi-linkedin"></i> LinkedIn
                </a>

            </div>
        </div>
        {% endfor %}

    </div>

</div>
{% endblock %}
