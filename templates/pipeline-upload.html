{% extends "base.html" %}
{% block title %}Upload Data{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">Cropsense Ingest</h1>
        <p class="lead text-muted">Please provide the required files for all three camera systems.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-10">
            <form action="/run-pipeline" method="POST" enctype="multipart/form-data">
                <div class="row g-4">

                    <div class="col-12">
                        <div class="card border-primary shadow-sm">
                            <div class="card-header bg-primary text-white fw-bold">
                                <i class="bi bi-layers-half me-2"></i>1. Spectral Camera Suite
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label small fw-bold text-uppercase">Raw Data (.tiff)</label>
                                        <input class="form-control" type="file" name="spectral_raw">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label small fw-bold text-uppercase">Manifest (.txt)</label>
                                        <input class="form-control" type="file" name="spectral_manifest">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label small fw-bold text-uppercase">Band Preview
                                            (.tiff)</label>
                                        <input class="form-control" type="file" name="spectral_band">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card h-100 shadow-sm border-0 bg-light">
                            <div class="card-header bg-primary text-white fw-bold">
                                <i class="bi bi-layers-half me-2"></i>2. Thermal Camera Suite
                            </div>
                            <div class="card-body">
                                <label class="form-label fw-bold"><i
                                        class="bi bi-thermometer-half me-2 text-danger"></i>Thermal (.rjpeg)</label>
                                <input class="form-control" type="file" name="thermal_file">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card h-100 shadow-sm border-0 bg-light">
                            <div class="card-header bg-primary text-white fw-bold">
                                <i class="bi bi-layers-half me-2"></i>3. RGB Camera Suite
                            </div>
                            <div class="card-body">
                                <label class="form-label fw-bold"><i class="bi bi-camera me-2 text-success"></i>RGB
                                    (.jpg)</label>
                                <input class="form-control" type="file" name="rgb_file">
                            </div>
                        </div>
                    </div>

                    <div class="col-12 text-center mt-4">
                        <button type="submit" class="btn btn-accent btn-lg px-5 py-3 fw-bold shadow">
                            START ETL PROCESS <i class="bi bi-cpu ms-2"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
