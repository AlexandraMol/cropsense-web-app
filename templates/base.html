<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}{% endblock %}</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{ url_for('static', filename='assets/images/plant.png') }}"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/global.css') }}"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top mt-3">
      <div class="container justify-content-center">
        <div class="nav-wrapper px-5 py-2 d-flex align-items-center gap-4">
          <a
            class="nav-link {% if request.path == '/' %}active{% endif %}"
            href="/"
            >Home</a
          >
          <a
            class="nav-link {% if request.path == '/upload-images' %}active{% endif %}"
            href="/upload-images"
            >Run Pipeline</a
          >
          <a
            class="nav-link {% if request.path == '/resources' %}active{% endif %}"
            href="/resources"
            >Resources</a
          >
          <a
                  class="nav-link {% if request.path == '/about-us' %}active{% endif %}"
                  href="/about-us"
          >About Us</a
          >
        </div>
      </div>
    </nav>
    {% block content %}{% endblock %}
  </body>
</html>
